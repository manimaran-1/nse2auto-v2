name: NSE Market Scanner

on:
  # schedule:
  #   # PRIMARY TRIGGER: Automatic Market Hours (Mon-Fri)
  #   # 3:46 UTC = 9:16 AM IST | 9:46 UTC = 3:16 PM IST
  #   - cron: '46 3-9 * * 1-5'
  workflow_dispatch: # OPTIONAL TRIGGER: Manual Scan from GitHub UI
  repository_dispatch: # EXTERNAL TRIGGER: For cron-job.org or other outside services
    types: [trigger-scan]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCAN_UNIVERSE: ${{ vars.SCAN_UNIVERSE || 'Total Cash Segment' }}
          SCAN_INTERVAL: ${{ vars.SCAN_INTERVAL || '1h' }}
          SEND_IF_EMPTY: ${{ vars.SEND_IF_EMPTY || 'True' }}
        run: |
          python automation_bot.py
